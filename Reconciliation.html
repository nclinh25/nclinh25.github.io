<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

<style>
  :root{
    --ink:#0f1b2d; --ink-soft:#37475c; --muted:#6b7a8d;
    --line:#dce3ec; --line-soft:#eef2f7;
    --bg:#f4f7fb; --panel:#ffffff;
    --blue:#1f5fd6; --blue-deep:#143e8c; --blue-wash:#eaf1fd;
    --steel:#41597a;
    --amber:#b56a00; --amber-wash:#fff4e2;
    --red:#b3261e; --red-wash:#fdecea;
    --green:#1f7a4d; --green-wash:#e7f5ee;
    --shadow:0 1px 2px rgba(16,33,61,.05),0 8px 24px rgba(16,33,61,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace}
  h1,h2,h3,h4{margin:0;color:var(--ink);font-weight:650;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  /* ---- shell ---- */
  .app{display:flex;min-height:100vh}
  .side{
    width:240px;flex:0 0 240px;background:linear-gradient(180deg,#12274a,#0e1f3c);
    color:#cdd9ec;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;
  }
  .brand{padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .logo{display:flex;align-items:center;gap:10px}
  .brand .mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#3f7be8,#1f5fd6);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
  .brand .name{color:#fff;font-weight:680;font-size:14.5px;letter-spacing:-.01em}
  .brand .sub{color:#7f93b4;font-size:11px;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
  .nav{padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
  .nav .grp{color:#647aa0;font-size:10px;letter-spacing:.09em;text-transform:uppercase;padding:12px 12px 5px;font-weight:650}
  .nav button{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    background:transparent;border:0;color:#bcccdf;border-radius:8px;
    padding:9px 12px;font-size:13.5px;font-weight:520;transition:.12s;position:relative
  }
  .nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav button.on{background:rgba(63,123,232,.22);color:#fff}
  .nav button.on::before{content:"";position:absolute;left:-10px;top:9px;bottom:9px;width:3px;border-radius:3px;background:#5b91f2}
  .nav .ic{width:17px;height:17px;flex:0 0 17px;opacity:.92}
  .nav .badge{margin-left:auto;background:rgba(255,255,255,.14);color:#fff;font-size:11px;
    padding:1px 7px;border-radius:20px;font-weight:600}
  .nav .badge.warn{background:var(--amber)}
  .nav .badge.ok{background:#1f7a4d}
  .side .foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#6c80a4}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    background:var(--panel);border-bottom:1px solid var(--line);
    padding:16px 30px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20
  }
  .topbar .crumb{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;font-weight:600}
  .topbar h2{font-size:18px;margin-top:2px}
  .topbar .desc{color:var(--muted);font-size:12.5px;margin-top:1px;font-weight:480}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .pipe{display:flex;align-items:center;gap:6px}
  .pdot{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:560}
  .pdot .d{width:8px;height:8px;border-radius:50%;background:var(--line);border:1px solid #cbd5e2}
  .pdot.done .d{background:var(--green);border-color:var(--green)}
  .pdot.done{color:var(--ink-soft)}
  .pipe .sep{width:14px;height:1px;background:var(--line)}

  .content{padding:26px 30px 60px;max-width:1320px;width:100%}
  .section-intro{margin-bottom:18px}
  .section-intro h3{font-size:15px}
  .section-intro p{color:var(--muted);margin:4px 0 0;font-size:13px;max-width:760px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  .card .hd{padding:15px 18px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px}
  .card .hd h4{font-size:13.5px}
  .card .hd .sub{color:var(--muted);font-size:12px;font-weight:480}
  .card .hd .right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .card .bd{padding:18px}
  .grid{display:grid;gap:18px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:1080px){.g2,.g3{grid-template-columns:1fr}}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;
    color:var(--ink-soft);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:580;transition:.12s}
  .btn:hover{border-color:#c3cedd;background:#fbfcfe}
  .btn .ic{width:15px;height:15px}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.pri:hover{background:var(--blue-deep);border-color:var(--blue-deep)}
  .btn.dk{background:var(--steel);border-color:var(--steel);color:#fff}
  .btn.dk:hover{background:#33486a}
  .btn.gh{background:transparent;border-color:transparent;color:var(--blue);padding:6px 9px}
  .btn.gh:hover{background:var(--blue-wash)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{color:var(--red);border-color:#f0c9c6}
  .btn.danger:hover{background:var(--red-wash)}

  /* dropzone */
  .drop{border:1.5px dashed #b9c7da;border-radius:11px;background:#f8fbff;
    padding:30px;text-align:center;transition:.14s;cursor:pointer}
  .drop:hover,.drop.hot{border-color:var(--blue);background:var(--blue-wash)}
  .drop .ring{width:48px;height:48px;border-radius:12px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--blue)}
  .drop h4{font-size:14px}
  .drop p{color:var(--muted);margin:5px 0 0;font-size:12.5px}
  .drop .formats{margin-top:10px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .chipfmt{font-size:11px;color:var(--steel);background:#eef3fa;border:1px solid #dde6f1;border-radius:6px;padding:2px 8px;font-weight:600}

  /* tables */
  .tw{overflow:auto;border:1px solid var(--line);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{background:#f6f9fd;text-align:left;padding:9px 12px;font-weight:620;color:var(--ink-soft);
    border-bottom:1px solid var(--line);white-space:nowrap;font-size:11.5px;letter-spacing:.02em;position:sticky;top:0}
  tbody td{padding:8px 12px;border-bottom:1px solid var(--line-soft);color:var(--ink-soft);vertical-align:top}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#fafcfe}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"SF Mono",ui-monospace,monospace}
  .tw.tall{max-height:430px}
  .tw.mid{max-height:340px}

  /* tags */
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;
    padding:2px 9px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
  .t-missing{background:var(--red-wash);color:var(--red);border-color:#f1cbc8}
  .t-under{background:var(--amber-wash);color:var(--amber);border-color:#f0d9b0}
  .t-over{background:#eaeefb;color:#3a4fb8;border-color:#cfd8f4}
  .t-same{background:var(--green-wash);color:var(--green);border-color:#bfe2cd}
  .t-soh{background:#eef1f5;color:var(--steel);border-color:#d9e0ea}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#eef3fa;color:var(--steel);border:1px solid #dde6f1}
  .pill.force{background:#f3eefb;color:#6b3fb0;border-color:#e0d3f3}
  .pill.same{background:#eef7f1;color:var(--green);border-color:#cfe8d8}

  /* stat cards */
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:15px 16px;box-shadow:var(--shadow)}
  .stat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:650;display:flex;align-items:center;gap:7px}
  .stat .val{font-size:26px;font-weight:700;margin-top:7px;letter-spacing:-.02em;line-height:1}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:500}
  .stat.red .val{color:var(--red)} .stat.amber .val{color:var(--amber)}
  .stat.blue .val{color:var(--blue)} .stat.green .val{color:var(--green)}

  .empty{text-align:center;padding:42px 20px;color:var(--muted)}
  .empty .ring{width:54px;height:54px;border-radius:14px;background:var(--blue-wash);
    display:flex;align-items:center;justify-content:center;margin:0 auto 13px;color:var(--blue)}
  .empty h4{font-size:14.5px;color:var(--ink-soft)} .empty p{margin:5px 0 0;font-size:13px;max-width:420px;display:inline-block}

  .note{display:flex;gap:10px;padding:11px 13px;border-radius:9px;font-size:12.5px;align-items:flex-start}
  .note.info{background:var(--blue-wash);color:var(--blue-deep);border:1px solid #cfe0fa}
  .note.warn{background:var(--amber-wash);color:#8a5200;border:1px solid #f0dcb4}
  .note.soh{background:#eef1f5;color:var(--steel);border:1px solid #dbe2ec}
  .note .ic{flex:0 0 16px;width:16px;height:16px;margin-top:1px}

  input.f,select.f{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:7px;
    padding:7px 10px;background:#fff;color:var(--ink);width:100%}
  input.f:focus,select.f:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-wash)}
  label.fl{font-size:11.5px;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:5px}

  .rule-edit input{border:1px solid transparent;background:transparent;border-radius:6px;padding:4px 7px;width:100%;font-size:12.5px;font-family:inherit;color:var(--ink-soft)}
  .rule-edit input:hover{background:#f3f6fb}
  .rule-edit input:focus{outline:none;background:#fff;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-wash)}

  .seg{display:inline-flex;background:#eef2f7;border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg button{border:0;background:transparent;padding:6px 14px;font-size:12.5px;font-weight:580;color:var(--muted);border-radius:7px}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

  .runrow{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);border-radius:10px;background:#fff;transition:.12s}
  .runrow:hover{border-color:#c3cedd;box-shadow:var(--shadow)}
  .runrow .fic{width:38px;height:38px;border-radius:9px;background:var(--blue-wash);color:var(--blue);display:flex;align-items:center;justify-content:center;flex:0 0 38px}
  .runrow .meta{flex:1;min-width:0}
  .runrow .meta .nm{font-weight:620;font-size:13.5px}
  .runrow .meta .dt{color:var(--muted);font-size:12px;margin-top:1px}

  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;
    border-radius:10px;font-size:13px;font-weight:540;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:200;display:flex;gap:9px;align-items:center;animation:pop .2s}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  .spin.dk{border-color:rgba(31,95,214,.25);border-top-color:var(--blue)}
  @keyframes sp{to{transform:rotate(360deg)}}

  .filterbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .fchip{font-size:12px;font-weight:580;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
  .fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .modal-bg{position:fixed;inset:0;background:rgba(15,27,45,.45);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}
  .modal{background:#fff;border-radius:14px;width:480px;max-width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal .mh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .modal .mb{padding:20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;background:#f9fbfd}
  .expandrow td{background:#f8fafd!important;padding:0!important}
  .subtw{margin:0;border:0}
  .subtw table{font-size:12px}
  .subtw thead th{background:#eef3fa}
  .linkbtn{background:none;border:0;color:var(--blue);font-weight:600;font-size:12.5px;padding:0;display:inline-flex;align-items:center;gap:5px}
  .help{font-size:12px;color:var(--muted);margin-top:6px}
  .kpiwrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:1080px){.kpiwrap{grid-template-columns:repeat(2,1fr)}}
  .divlabel{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:680;margin:0 0 9px}
</style>

<script type="text/babel" data-presets="react">

/* ───────────────────────── DEFAULT AUDIT RULES (per customer) ───────────────────────── */
// customer -> which group's rules to seed from (groups are only used here to build defaults; the live model is flat)
const _CUST_GROUP = {
  ANTAP:"ANTAP", ANZ:"ANZ", ASM:"ASM", MCG:"MCG", PFC:"PFC",

// 0C: Audit Enquiry → keep 6 cols, keep only PICK/BREC/RECN/TREC

    const task=String(col(r,"task","billingtask")||"").trim().toUpperCase();
    if(!customer || !AUDIT_KEEP_TASKS.includes(task)) return;
    out.push({
      customer, task,

      units: String(col(r,"packtype","units","unit","uom")||"").trim(),

/* ───────────────────────── PDF EXTRACTION ───────────────────────── */
async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let text="";
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    // collect items with x,y; group into lines by y with a small tolerance
    const items = c.items.map(it=>({x:it.transform[4], y:it.transform[5], s:it.str})).filter(it=>it.s.trim()!=="");
    items.sort((a,b)=> b.y-a.y || a.x-b.x);
    const lines=[]; let cur=null;
    for(const it of items){
      if(!cur || Math.abs(it.y-cur.y)>3){ cur={y:it.y, items:[it]}; lines.push(cur); }
      else cur.items.push(it);
    }
    lines.forEach(ln=>{
      const txt=ln.items.sort((a,b)=>a.x-b.x).map(i=>i.s).join(" ").replace(/\s+/g," ").trim();
      if(txt) text+=txt+"\n";
    });
  }
  return text;
}
// Parse extracted text into customer + charge lines — handles real charge-detail layout:
// header "CLIENT CODE xxx", columns BILLING TASK | ORDER NO | PRODUCT | GROUP REF | UNITS | RATE | QTY,
// wrapped product names on continuation lines, "~" stock-on-hand orders, junk numeric tasks, TOTAL QTY footer.
const KNOWN_TASKS = ["PICK","STOR","STOP","STOPP","PICKP","RECN","REC","SCAN","BREC","TREC","RECP"];
const UNIT_WORDS = ["PALLET","CARTON","ORDER","EACH","CTN","PLT","UNIT","CASE"];
const isNum = (s)=> /^-?\d+(\.\d+)?$/.test(s);

function parseChargeText(text){
  const out={customer:null, lines:[], warnings:[]};
  const rawLines = text.split(/\n/).map(s=>s.replace(/\s+/g," ").trim());
  // customer = CLIENT CODE token
  for(const l of rawLines){
    let m=l.match(/client\s*code\s+(\S+)/i) || l.match(/customer\s*[:\-]?\s*(\S+)/i);
    if(m){ out.customer=m[1].trim().toUpperCase(); break; }
  }
  if(!out.customer) out.warnings.push("No client code found in document");

  let pending=null; // last data row, for product-name continuation
  for(const l of rawLines){
    if(!l) continue;
    if(/^(billing task|total qty|charge detail|client code|name |period|from date|to date|page\b)/i.test(l)) { pending=null; continue; }
    const parts=l.split(" ");
    const task=parts[0].toUpperCase();
    const isTask = KNOWN_TASKS.includes(task) || /^\d+$/.test(task); // numeric = manual billing code
    if(isTask){
      // tail layout: ... [GROUP REF] UNITS RATE QTY  — QTY last numeric, RATE 2nd-last numeric, UNITS before that
      if(parts.length>=4 && isNum(parts[parts.length-1]) && isNum(parts[parts.length-2])){
        const qty=parseFloat(parts[parts.length-1]);
        const units=parts[parts.length-3]||"";
        const groupref=parts[parts.length-4]||"";
        const order=parts[1];
        // product sits between order and the group-ref token
        const product=parts.slice(2, parts.length-4).join(" ").trim();
        const rec={task, order, product, groupref, units, qty};
        out.lines.push(rec); pending=rec;
      } else { pending=null; }
    } else {
      // continuation line: a wrapped product name (no recognized task, not starting with a number)
      if(pending && !isNum(parts[0]) && !UNIT_WORDS.includes(task)){
        pending.product=(pending.product+" "+l).trim();
      }
    }
  }
  if(out.lines.length===0) out.warnings.push("No charge lines could be parsed — check the document layout");
  return out;
}

/* ───────────────────────── RULE ENGINE: transform WMS ───────────────────────── */
function buildCustLookup(rules){
  const m={};
  (rules.customers||[]).forEach(c=>{ m[c.code.toUpperCase()] = c.rules||[]; });
  return m;
}
function transformWMS(rawRows, rules){
  const custRules = buildCustLookup(rules);
  const out=[]; const issues=[];
  rawRows.forEach((r,i)=>{
    const code = (r.customer||"").toUpperCase();
    const task = (r.task||"").toUpperCase();
    const isManual = r.source==="Manual Task" || r.product==="~" || /^\d+$/.test(task);
    // Manual tasks (numeric codes / Product="~") are already billable lines — pass through 1:1, no expansion
    if(isManual){
      out.push({ customer:code, srcTask:r.task, task, qtyMode:"Manual",
        order:r.order, product:r.product, units:r.units, qty:Number(r.qty)||0, manual:true });
      return;
    }
    const rset = custRules[code];
    if(!rset){ issues.push(`Row ${i+1}: customer ${code||"(blank)"} has no rules`); return; }
    const taskRules = rset.filter(g=>g.in.toUpperCase()===task);
    if(taskRules.length===0){ issues.push(`Row ${i+1}: ${code}/${r.task} has no transform rule`); return; }
    taskRules.forEach(tr=>{
      const force = tr.qty==="Force1";
      const qty = force ? 1 : Number(r.qty)||0;
      const units = force ? "PALLET" : r.units;   // Force1 = pallet-based charge
      out.push({
        customer: code,
        srcTask: r.task, task: tr.out, qtyMode: tr.qty,
        order: r.order, product: r.product, units, qty,
      });
    });
  });
  return {rows:out, issues};
}

/* ───────────────────────── COMPARISON ENGINE ───────────────────────── */
const keyOf = (r)=>[r.customer,r.task,r.order,r.product,r.units].map(x=>String(x||"").toUpperCase().trim()).join("¦");

function compare(wmsT, chargeByCust, custMap){
  // index WMS transformed by key
  const wmsMap = {};
  wmsT.forEach(r=>{ const k=keyOf(r); wmsMap[k]=(wmsMap[k]||{...r,qty:0}); wmsMap[k].qty+=r.qty; });

  // split charge lines: stock-on-hand (Order No = "~") are pulled OUT of comparison entirely
  const chgMap = {};
  const sohLines = [];
  Object.entries(chargeByCust).forEach(([code, lines])=>{
    lines.forEach(l=>{
      const isSOH = String(l.order||"").trim()==="~";
      if(isSOH){
        sohLines.push({customer:code, task:String(l.task).toUpperCase(), product:l.product, units:l.units, qty:Number(l.qty)||0});
        return; // never enters the comparison
      }
      const rec={customer:code, task:l.task.toUpperCase(), order:l.order, product:l.product, units:l.units, qty:Number(l.qty)||0};
      const k=keyOf(rec);
      chgMap[k]=chgMap[k]||{...rec,qty:0};
      chgMap[k].qty+=rec.qty;
    });
  });

  const allKeys = new Set([...Object.keys(wmsMap),...Object.keys(chgMap)]);
  const detail=[];
  allKeys.forEach(k=>{
    const w=wmsMap[k], c=chgMap[k];
    const wq=w?w.qty:0, cq=c?c.qty:0;
    if(wq===cq) return; // matched - skip
    const base = w||c;
    let type;
    if(!c) type="MISSING";           // whole row missing in charge detail
    else if(cq<wq) type="UNDER";     // charge has less than WMS says
    else type="OVER";                // charge has more than WMS says (incl. PDF-only, non-SOH)
    detail.push({
      customer:base.customer, task:base.task, order:base.order, product:base.product, units:base.units,
      chargeQty:cq, wmsQty:wq, diff:wq-cq, type,
    });
  });
  // summary by customer+task
  const sm={};
  detail.forEach(d=>{
    const k=d.customer+"¦"+d.task;
    sm[k]=sm[k]||{customer:d.customer,task:d.task,chargeQty:0,wmsQty:0,rows:[]};
    sm[k].chargeQty+=d.chargeQty; sm[k].wmsQty+=d.wmsQty; sm[k].rows.push(d);
  });
  const summary = Object.values(sm).map(s=>({
    ...s, diff:s.wmsQty-s.chargeQty,
    type: s.wmsQty>s.chargeQty ? (s.chargeQty===0?"MISSING":"UNDER") : "OVER",
  })).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));

  // stock-on-hand tab: aggregate by customer + task + product + units
  const sohAgg={};
  sohLines.forEach(s=>{
    const k=[s.customer,s.task,s.product,s.units].join("¦");
    sohAgg[k]=sohAgg[k]||{customer:s.customer,task:s.task,product:s.product,units:s.units,qty:0};
    sohAgg[k].qty+=s.qty;
  });
  const soh=Object.values(sohAgg).sort((a,b)=> a.customer.localeCompare(b.customer) || a.task.localeCompare(b.task) || b.qty-a.qty);

  return {summary, detail, soh};
}

/* ───────────────────────── PERSISTENCE ───────────────────────── */
const STORE = window.storage || null;
async function sGet(k){ if(!STORE) return JSON.parse(localStorage.getItem(k)||"null"); try{const r=await STORE.get(k);return r?JSON.parse(r.value):null;}catch{return null;} }
async function sSet(k,v){ const val=JSON.stringify(v); if(!STORE){localStorage.setItem(k,val);return;} try{await STORE.set(k,val);}catch{localStorage.setItem(k,val);} }
async function sList(p){ if(!STORE){return Object.keys(localStorage).filter(k=>k.startsWith(p));} try{const r=await STORE.list(p);return r?r.keys:[];}catch{return [];} }
async function sDel(k){ if(!STORE){localStorage.removeItem(k);return;} try{await STORE.delete(k);}catch{localStorage.removeItem(k);} }

/* ───────────────────────── SMALL UI HELPERS ───────────────────────── */
const fmt = (n)=> (n===undefined||n===null||isNaN(n))?"—":Number(n).toLocaleString();
const TypeTag=({t})=>{
  const map={MISSING:["t-missing","Missing row"],UNDER:["t-under","Undercharge"],OVER:["t-over","Overcharge"]};
  const [c,l]=map[t]||["t-same",t]; return <span className={"tag "+c}>{l}</span>;
};
