        {task:"RECP",order:"PO66010",product:"PRAWN-BULK",units:"CTN",qty:1},
        {task:"SCAN",order:"PO66010",product:"PRAWN-BULK",units:"CTN",qty:11},
        {task:"STOP",order:"~",product:"FISH-FILLET",units:"CTN",qty:8}, // SOH
      ]},
    ];
    const got=samples.map(s=>({name:`charge_detail_${s.code}.pdf`, customer:s.name, code:s.code, lines:s.lines, warnings:[]}));
    setPdfs(p=>[...p,...got]); setResult(null);
    flash(`Loaded ${got.length} sample charge-detail PDFs`);
  };
  const removePdf=(i)=>setPdfs(p=>p.filter((_,j)=>j!==i));

  /* ---- transform ---- */
  const doTransform=()=>{
    const t=transformWMS(rawWMS, rules);
    setTransformed(t); setResult(null);
    flash(`Transformed ${rawWMS.length} → ${t.rows.length} audit-ready rows`);
    setView("transform");
  };

  /* ---- compare ---- */
  const doCompare=()=>{
    let t=transformed;
    if(!t){ t=transformWMS(rawWMS, rules); setTransformed(t); }
    const chargeByCust={};
    pdfs.forEach(p=>{ if(p.code){ chargeByCust[p.code]=(chargeByCust[p.code]||[]).concat(p.lines); } });
    const r=compare(t.rows, chargeByCust, rules.customers);
    setResult(r);
    flash(`Comparison complete — ${r.summary.length} variance group${r.summary.length!==1?"s":""} found`);
    setView("summary");
  };

  /* ---- rules ---- */
  const saveRules=async()=>{ await sSet("wms:rules",rules); setTransformed(null); setResult(null); flash("Audit rules saved as the active rule set"); };
  const resetRules=()=>{ setRules(DEFAULT_RULES); flash("Rules reset to default — remember to save"); };

  /* ---- save run ---- */
  const saveRun=async(name)=>{
    if(!result) return;
    const id="wms:run:"+Date.now();
    const run={ id, name, savedAt:Date.now(),
      summary:result.summary, detail:result.detail, soh:result.soh||[],
      counts:{ wmsRaw:rawWMS.length, wmsAE:aeRows.length, wmsMT:mtRows.length, wmsT:transformed?.rows.length||0, pdfs:pdfs.length,
               lines: pdfs.reduce((a,p)=>a+p.lines.length,0), variances:result.summary.length },
      ruleSnapshot: rules,
      pdfInfo: pdfs.map(p=>({name:p.name,customer:p.customer,code:p.code,lines:p.lines.length})),
    };
    await sSet(id,run); await loadRuns(); flash(`Saved run "${name}"`);
  };
  const deleteRun=async(id)=>{ await sDel(id); await loadRuns(); flash("Run deleted"); };

  /* ---- excel export ---- */
  const exportExcel=(src)=>{
    const sum = src ? src.summary : result.summary;
    const det = src ? src.detail : result.detail;
    const sohRows = (src ? src.soh : result.soh) || [];
    const wb=XLSX.utils.book_new();
    // summary sheet
    const sumRows=sum.map(s=>({
      Customer:s.customer, Task:s.task,
      "Charge Detail Qty":s.chargeQty, "Should Be (WMS)":s.wmsQty,
      Difference:s.diff, "Variance Type":({MISSING:"Missing row",UNDER:"Undercharge",OVER:"Overcharge"})[s.type],
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sumRows), "Variance Summary");
    // breakdown
    const detRows=det.map(d=>({
      Customer:d.customer, Task:d.task, "Order No":d.order, Product:d.product, Units:d.units,
      "Charge Detail Qty":d.chargeQty, "Should Be (WMS)":d.wmsQty, Difference:d.diff,
      "Variance Type":({MISSING:"Missing row",UNDER:"Undercharge",OVER:"Overcharge"})[d.type],
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detRows), "Variance Breakdown");
    // stock on hand: summary (customer+task+unit) + product detail
    if(sohRows.length){
      const sm={};
      sohRows.forEach(s=>{ const k=[s.customer,s.task,s.units].join("¦");
        sm[k]=sm[k]||{Customer:s.customer,Task:s.task,Units:s.units,"Total Qty":0};
        sm[k]["Total Qty"]+=s.qty; });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(Object.values(sm)), "Stock On Hand");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sohRows.map(s=>({
        Customer:s.customer, Task:s.task, Product:s.product, Units:s.units, Qty:s.qty,
      }))), "Stock On Hand (Products)");
    }
    // transformed WMS
    if(transformed && !src){
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(transformed.rows.map(r=>({
        Customer:r.customer,"Source Task":r.srcTask,"Output Task":r.task,
        "Qty Mode":r.qtyMode,"Order No":r.order,Product:r.product,Units:r.units,Qty:r.qty,
      }))), "Transformed WMS");
    }
    // pdf detail
    const pdfRows=[];
    pdfs.forEach(p=>p.lines.forEach(l=>pdfRows.push({Source:p.name,Customer:p.customer,Code:p.code,Task:l.task,"Order No":l.order,Product:l.product,Units:l.units,Qty:l.qty})));
    if(pdfRows.length && !src) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pdfRows),"Charge Detail (Extracted)");
    // rule version (per customer)
    const ruleRows=[];
    ((src? src.ruleSnapshot: rules).customers||[]).forEach(c=>{
      if(!c.rules || c.rules.length===0){ ruleRows.push({Customer:c.code,"Source Task":"(no rules)","Output Task":"","Qty Mode":""}); return; }
      c.rules.forEach(r=>ruleRows.push({Customer:c.code,"Source Task":r.in,"Output Task":r.out,"Qty Mode":r.qty}));
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ruleRows),"Audit Rules Used");
    const fn=(src? src.name.replace(/[^\w]+/g,"_"): "WMS_Reconciliation_"+new Date().toISOString().slice(0,10))+".xlsx";
    XLSX.writeFile(wb, fn);
    flash("Excel report downloaded");
  };

  const NAV=[
    {grp:"Overview"},
    {id:"dash",label:"Dashboard",ic:I.dash},
    {grp:"Inputs"},
    {id:"wms",label:"Upload WMS Data",ic:I.wms,badge:pipeline.wms?String(rawWMS.length):null,bk:"ok"},
    {id:"pdf",label:"Charge Detail PDFs",ic:I.pdf,badge:pipeline.pdf?String(pdfs.length):null,bk:"ok"},
    {id:"rules",label:"Audit Rules",ic:I.rules},
    {grp:"Process"},
    {id:"transform",label:"Transform WMS",ic:I.transform,badge:transformed?"✓":null,bk:"ok"},
    {id:"summary",label:"Variance Summary",ic:I.variance,badge:result?String(result.summary.length):null,bk:result&&result.summary.length?"warn":null},
    {id:"breakdown",label:"Variance Breakdown",ic:I.drill},
    {id:"soh",label:"Stock on Hand",ic:I.archive,badge:result&&result.soh&&result.soh.length?String(result.soh.length):null},
    {grp:"Output"},
    {id:"save",label:"Save Run",ic:I.save},
    {id:"runs",label:"Saved Runs",ic:I.archive,badge:runs.length?String(runs.length):null},
  ];
  const TITLES={
    dash:["Overview","Reconciliation Dashboard","End-to-end status of the current audit variance run"],
    wms:["Inputs","Upload WMS Data","Operational pick / receipt data exported from the warehouse system"],
    pdf:["Inputs","Charge Detail PDFs","Customer charge-detail documents to reconcile against WMS"],
    rules:["Inputs","Audit Rules","Customer rule-group mapping and task transformation logic"],
    transform:["Process","Transform WMS Data","Apply audit rules to produce audit-ready WMS rows"],
    summary:["Results","Variance Summary","Only the customer / task combinations that differ"],
    breakdown:["Results","Variance Breakdown","Exact rows driving each variance, for operational review"],
    soh:["Results","Stock on Hand","Charge-detail lines with Order No = \"~\", excluded from variance"],
    save:["Output","Save Run","Archive this reconciliation by week ending"],
    runs:["Output","Saved Runs","Browse and re-open past reconciliation runs"],
  };
  const t=TITLES[view]||["",""];

  return (
    <div className="app">
      {/* SIDEBAR */}
      <aside className="side">
        <div className="brand">
          <div className="logo">
            <div className="mark">VR</div>
            <div><div className="name">Variance&nbsp;Reconcile</div><div className="sub">Cold Storage · 3PL</div></div>
          </div>
        </div>
        <nav className="nav">
          {NAV.map((n,i)=> n.grp
            ? <div className="grp" key={"g"+i}>{n.grp}</div>
            : <button key={n.id} className={view===n.id?"on":""} onClick={()=>setView(n.id)}>
                <svg className="ic" width="17" height="17" viewBox="0 0 24 24" fill={["dash","pdf","wms"].includes(n.id)?"currentColor":"none"}>{n.ic}</svg>
                {n.label}
                {n.badge && <span className={"badge "+(n.bk==="warn"?"warn":n.bk==="ok"?"ok":"")}>{n.badge}</span>}
              </button>
          )}
        </nav>
        <div className="foot">Internal tool · data stays in your session</div>
      </aside>

      {/* MAIN */}
      <div className="main">
        <header className="topbar">
          <div>
            <div className="crumb">{t[0]}</div>
            <h2>{t[1]}</h2>
            <div className="desc">{t[2]}</div>
          </div>
          <div className="right">
            <Pipeline p={pipeline}/>
          </div>
        </header>

        <div className="content">
          {view==="dash" && <Dashboard {...{pipeline,rawWMS,pdfs,transformed,result,runs,setView,doTransform,doCompare,exportExcel,resolveCode}}/>}
          {view==="wms" && <WMSView {...{aeRows,aeFile,mtRows,mtFile,onAuditFile,onManualFile,clearAe,clearMt,loadSampleWMS,rawWMS,transformed,setView,doTransform}}/>}
          {view==="pdf" && <PDFView {...{pdfs,onPDFFiles,loadSamplePDFs,removePdf,pdfBusy,resolveCode,setView,doCompare,pipeline}}/>}
          {view==="rules" && <RulesView {...{rules,setRules,saveRules,resetRules}}/>}
          {view==="transform" && <TransformView {...{rawWMS,transformed,doTransform,rules,setView,doCompare,pipeline}}/>}
          {view==="summary" && <SummaryView {...{result,doCompare,pipeline,setView}}/>}
          {view==="breakdown" && <BreakdownView {...{result,doCompare,pipeline,setView}}/>}
          {view==="soh" && <SOHView {...{result,doCompare,pipeline,setView}}/>}
          {view==="save" && <SaveView {...{result,saveRun,setView}}/>}
          {view==="runs" && <RunsView {...{runs,deleteRun,exportExcel,setView}}/>}
        </div>
      </div>

      {toast && <div className="toast"><Ic d={I.check} s={16}/>{toast}</div>}
    </div>
  );
}

/* ───────────────────────── PIPELINE INDICATOR ───────────────────────── */
function Pipeline({p}){
  const steps=[["WMS",p.wms],["PDFs",p.pdf],["Transform",p.transform],["Compare",p.compare]];
  return <div className="pipe">{steps.map(([l,d],i)=>
    <React.Fragment key={l}>
      {i>0 && <span className="sep"/>}
      <span className={"pdot"+(d?" done":"")}><span className="d"/>{l}</span>
    </React.Fragment>)}</div>;
}

/* ───────────────────────── DASHBOARD ───────────────────────── */
function Dashboard({pipeline,rawWMS,pdfs,transformed,result,runs,setView,doTransform,doCompare,exportExcel,resolveCode}){
  const matched=pdfs.filter(p=>p.code).length;
  const lines=pdfs.reduce((a,p)=>a+p.lines.length,0);
  const totalVar = result? result.detail.reduce((a,d)=>a+Math.abs(d.diff),0):0;
  return <>
    <div className="kpiwrap">
      <Stat lab="WMS rows" ic={I.wms} val={fmt(rawWMS.length)} sub={transformed?`${fmt(transformed.rows.length)} after transform`:"raw operational rows"} k="blue"/>
      <Stat lab="Charge PDFs" ic={I.pdf} val={fmt(pdfs.length)} sub={`${matched} matched · ${fmt(lines)} lines`} k="blue"/>
      <Stat lab="Variance groups" ic={I.variance} val={result?fmt(result.summary.length):"—"} sub={result?"customer / task combos":"run compare first"} k={result&&result.summary.length?"amber":""}/>
      <Stat lab="Net unit variance" ic={I.drill} val={result?fmt(totalVar):"—"} sub="total quantity in dispute" k={totalVar?"red":""}/>
    </div>

    <div className="card" style={{marginBottom:18}}>
      <div className="hd"><Ic d={I.transform} s={17}/><h4>Reconciliation workflow</h4><span className="sub">Run each step in order</span></div>
      <div className="bd">
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
          <Step n="1" t="Upload WMS" done={pipeline.wms} onClick={()=>setView("wms")} ic={I.wms}/>
          <Step n="2" t="Upload PDFs" done={pipeline.pdf} onClick={()=>setView("pdf")} ic={I.pdf}/>
          <Step n="3" t="Transform" done={pipeline.transform} onClick={()=>setView("transform")} ic={I.transform} disabled={!pipeline.wms}/>
          <Step n="4" t="Compare" done={pipeline.compare} onClick={()=> (pipeline.wms&&pipeline.pdf)?doCompare():setView("pdf")} ic={I.compare} disabled={!pipeline.wms||!pipeline.pdf}/>
          <Step n="5" t="Export" done={false} onClick={()=> result?exportExcel():setView("summary")} ic={I.excel} disabled={!result}/>
        </div>
      </div>
    </div>

    <div className="grid g2">
      <div className="card">
        <div className="hd"><Ic d={I.warn} s={17}/><h4>Top variances</h4>
          <div className="right">{result && <button className="btn gh sm" onClick={()=>setView("summary")}>View all<Ic d={I.chev} s={13}/></button>}</div></div>
        <div className="bd" style={{paddingTop:6}}>
          {!result ? <MiniEmpty msg="No comparison yet. Upload inputs and run Compare."/> :
            <div className="tw">
              <table><thead><tr><th>Customer</th><th>Task</th><th className="num">Charged</th><th className="num">Should be</th><th className="num">Diff</th><th>Type</th></tr></thead>
              <tbody>{result.summary.slice(0,6).map((s,i)=>
                <tr key={i}><td><b>{s.customer}</b></td><td>{s.task}</td><td className="num">{fmt(s.chargeQty)}</td><td className="num">{fmt(s.wmsQty)}</td>
                <td className="num" style={{color:s.diff>0?"var(--red)":"var(--blue)",fontWeight:600}}>{s.diff>0?"+":""}{s.diff}</td><td><TypeTag t={s.type}/></td></tr>)}</tbody></table>
            </div>}
        </div>
      </div>
      <div className="card">
        <div className="hd"><Ic d={I.archive} s={17}/><h4>Recent saved runs</h4>
          <div className="right"><button className="btn gh sm" onClick={()=>setView("runs")}>Archive<Ic d={I.chev} s={13}/></button></div></div>
        <div className="bd" style={{paddingTop:10,display:"flex",flexDirection:"column",gap:10}}>
          {runs.length===0 ? <MiniEmpty msg="No saved runs yet. Reconcile then save by week ending."/> :
            runs.slice(0,4).map(r=>
              <div className="runrow" key={r.id} style={{cursor:"pointer"}} onClick={()=>setView("runs")}>
                <div className="fic"><Ic d={I.folder} s={18}/></div>
                <div className="meta"><div className="nm">{r.name}</div><div className="dt">{r.counts.variances} variances · {new Date(r.savedAt).toLocaleDateString()}</div></div>
              </div>)}
        </div>
      </div>
    </div>
  </>;
}
const Stat=({lab,val,sub,ic,k})=> <div className={"stat "+(k||"")}><div className="lab"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" style={{opacity:.7}}>{ic}</svg>{lab}</div><div className="val">{val}</div><div className="sub">{sub}</div></div>;
const Step=({n,t,done,onClick,ic,disabled})=>
  <button onClick={disabled?undefined:onClick} disabled={disabled}
    style={{textAlign:"left",border:"1px solid "+(done?"var(--green)":"var(--line)"),background:done?"var(--green-wash)":"#fff",
    borderRadius:10,padding:"13px 13px",display:"flex",flexDirection:"column",gap:8,opacity:disabled?.5:1,cursor:disabled?"not-allowed":"pointer"}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{width:24,height:24,borderRadius:7,background:done?"var(--green)":"var(--blue-wash)",color:done?"#fff":"var(--blue)",
        display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12}}>{done?"✓":n}</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill={["dash","pdf","wms"].includes("")?"currentColor":"none"} style={{color:done?"var(--green)":"var(--steel)"}}>{ic}</svg>
    </div>
    <div style={{fontWeight:600,fontSize:13,color:"var(--ink)"}}>{t}</div>
  </button>;
const MiniEmpty=({msg})=> <div style={{padding:"22px 6px",textAlign:"center",color:"var(--muted)",fontSize:13}}>{msg}</div>;

/* ───────────────────────── DROPZONE ───────────────────────── */
function Drop({onFiles,accept,multiple,webkitdirectory,title,sub,formats,busy}){
  const [hot,setHot]=useState(false); const ref=useRef();
  return <div className={"drop"+(hot?" hot":"")} onClick={()=>ref.current.click()}
    onDragOver={e=>{e.preventDefault();setHot(true);}} onDragLeave={()=>setHot(false)}
    onDrop={e=>{e.preventDefault();setHot(false);onFiles(e.dataTransfer.files);}}>
    <input ref={ref} type="file" accept={accept} multiple={multiple}
      {...(webkitdirectory?{webkitdirectory:"",directory:""}:{})}
      style={{display:"none"}} onChange={e=>{onFiles(e.target.files);e.target.value="";}}/>
    <div className="ring">{busy?<span className="spin dk"/>:<Ic d={I.up} s={22}/>}</div>
    <h4>{title}</h4>{sub && <p>{sub}</p>}
    {formats && <div className="formats">{formats.map(f=><span className="chipfmt" key={f}>{f}</span>)}</div>}
  </div>;
}

/* ───────────────────────── WMS VIEW ───────────────────────── */
function normalizeWMS(r){
  const g=(...keys)=>{ for(const k of Object.keys(r)){ const kk=k.toLowerCase().replace(/[^a-z]/g,""); if(keys.includes(kk)) return r[k]; } return ""; };
  return {
    customer: String(g("client","customercode","customer","custcode","code","cust","clientcode")||"").trim(),
    task: String(g("task","billingtask","tasktype","billtask")||"").trim().toUpperCase(),
    order: String(g("orderno","ordernumber","order")||"").trim(),
    product: String(g("product","item","sku","productcode")||"").trim(),
    units: String(g("packtype","units","unit","uom","packsize")||"").trim(),
    qty: Number(g("quantity","qty","quantityqty","qtyquantity"))||0,
  };
}
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const split=(l)=>{ const out=[];let cur="",q=false; for(let i=0;i<l.length;i++){const c=l[i]; if(c=='"'){q=!q;} else if(c==","&&!q){out.push(cur);cur="";} else cur+=c;} out.push(cur); return out.map(s=>s.trim().replace(/^"|"$/g,"")); };
  const hd=split(lines[0]);
  return lines.slice(1).map(l=>{ const c=split(l); const o={}; hd.forEach((h,i)=>o[h]=c[i]||""); return o; });
}
function WMSView({aeRows,aeFile,mtRows,mtFile,onAuditFile,onManualFile,clearAe,clearMt,loadSampleWMS,rawWMS,transformed,setView,doTransform}){
  const [srcFilter,setSrcFilter]=useState("ALL");
  const preview = rawWMS.filter(r=> srcFilter==="ALL" || (srcFilter==="AE"&&r.source==="Audit Enquiry") || (srcFilter==="MT"&&r.source==="Manual Task"));
  return <>
    <div className="grid g2" style={{marginBottom:18}}>
      {/* Audit Enquiry slot */}
      <div className="card">
        <div className="hd"><Ic d={I.wms} s={17}/><h4>Audit Enquiry</h4><span className="sub">operational tasks</span>
          {aeRows.length>0 && <div className="right"><span className="tag t-same">{aeRows.length} rows</span></div>}</div>
        <div className="bd">
          {aeRows.length===0
            ? <Drop onFiles={f=>f[0]&&onAuditFile(f[0])} accept=".xlsx,.xls,.csv"
                title="Drop Audit Enquiry export" sub="" formats={[".xls",".xlsx",".csv"]}/>
            : <div>
                <div className="runrow"><div className="fic"><Ic d={I.file} s={18}/></div>
                  <div className="meta"><div className="nm mono" style={{fontSize:12.5}}>{aeFile}</div><div className="dt">{aeRows.length} rows kept after cleaning</div></div>
                  <button className="btn sm danger" onClick={clearAe}><Ic d={I.trash} s={14}/></button></div>
              </div>}
        </div>
      </div>
      {/* Manual Task slot */}
      <div className="card">
        <div className="hd"><Ic d={I.rules} s={17}/><h4>Manual Task Entry</h4><span className="sub">manual billing</span>
          {mtRows.length>0 && <div className="right"><span className="tag t-same">{mtRows.length} rows</span></div>}</div>
        <div className="bd">
          {mtRows.length===0
            ? <Drop onFiles={f=>f[0]&&onManualFile(f[0])} accept=".xlsx,.xls,.csv"
                title="Drop Manual Task Entry export" sub="" formats={[".xls",".xlsx",".csv"]}/>
            : <div>
                <div className="runrow"><div className="fic" style={{background:"#f3eefb",color:"#6b3fb0"}}><Ic d={I.file} s={18}/></div>
                  <div className="meta"><div className="nm mono" style={{fontSize:12.5}}>{mtFile}</div><div className="dt">{mtRows.length} manual rows · Product set to "~"</div></div>
                  <button className="btn sm danger" onClick={clearMt}><Ic d={I.trash} s={14}/></button></div>
              </div>}
        </div>
      </div>
    </div>

    {rawWMS.length===0 &&
      <div className="card"><div className="bd">
        <Empty ic={I.wms} h="No WMS data loaded yet" p="Upload your Audit Enquiry and Manual Task Entry exports above — or load the sample to explore the workflow."
          cta="Load sample WMS data" onCta={loadSampleWMS}/>
      </div></div>}

    {rawWMS.length>0 && <div className="card">
      <div className="hd"><Ic d={I.wms} s={17}/><h4>Normalized WMS (tblWMS)</h4>
        <span className="sub">{aeRows.length} audit + {mtRows.length} manual = {rawWMS.length} rows</span>
        <div className="right">
          <div className="seg" style={{marginRight:8}}>
            <button className={srcFilter==="ALL"?"on":""} onClick={()=>setSrcFilter("ALL")}>All</button>
            <button className={srcFilter==="AE"?"on":""} onClick={()=>setSrcFilter("AE")}>Audit</button>
            <button className={srcFilter==="MT"?"on":""} onClick={()=>setSrcFilter("MT")}>Manual</button>
          </div>
          <button className="btn pri sm" onClick={doTransform}><Ic d={I.transform} s={14}/>Transform with audit rules</button>
        </div></div>
      <div className="bd">
        <div className="tw tall">
          <table><thead><tr><th>Customer</th><th>Billing task</th><th>Order no</th><th>Product</th><th>Units</th><th className="num">Qty</th><th>Source</th></tr></thead>
          <tbody>{preview.slice(0,500).map((r,i)=>
            <tr key={i}>
              <td><b>{r.customer}</b></td>
              <td><span className={"pill"+(r.source==="Manual Task"?" force":"")}>{r.task}</span></td>
              <td className="mono">{r.order}</td>
              <td>{r.product==="~"? <span className="tag t-soh">~ manual</span> : r.product}</td>
              <td>{r.units}</td><td className="num">{fmt(r.qty)}</td>
              <td><span style={{fontSize:11,color:"var(--muted)"}}>{r.source}</span></td>
            </tr>)}</tbody></table>
        </div>
        {preview.length>500 && <p className="help">Showing first 500 of {preview.length} rows.</p>}
      </div>
    </div>}
  </>;
}

/* ───────────────────────── PDF VIEW ───────────────────────── */
function PDFView({pdfs,onPDFFiles,loadSamplePDFs,removePdf,pdfBusy,setView,doCompare,pipeline}){
  const [openPdf,setOpenPdf]=useState(null);
  const matched=pdfs.filter(p=>p.code).length;
  const lines=pdfs.reduce((a,p)=>a+p.lines.length,0);
  const warns=pdfs.reduce((a,p)=>a+p.warnings.length,0);
  return <>
    <div className="grid g2" style={{marginBottom:18}}>
      <div className="card">
        <div className="hd"><Ic d={I.folder} s={17}/><h4>Upload a folder of PDFs</h4></div>
        <div className="bd">
          <Drop onFiles={onPDFFiles} accept=".pdf" multiple webkitdirectory busy={pdfBusy}
            title="Drop a whole folder of charge-detail PDFs"
            sub="Selects every PDF in the folder at once" formats={["folder","*.pdf"]}/>
        </div>
      </div>
      <div className="card">
        <div className="hd"><Ic d={I.pdf} s={17}/><h4>Or upload individual PDFs</h4></div>
        <div className="bd">
          <Drop onFiles={onPDFFiles} accept=".pdf" multiple busy={pdfBusy}
            title="Drop up to 20+ PDF files"
            sub="Select multiple charge-detail documents individually" formats={["*.pdf","multi-select"]}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:13}}>
            <button className="btn sm" onClick={loadSamplePDFs}><Ic d={I.play} s={13}/>Load sample charge details</button>
          </div>
        </div>
      </div>
    </div>

    {pdfs.length>0 && <>
      <div className="kpiwrap" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        <Stat lab="PDFs uploaded" ic={I.pdf} val={fmt(pdfs.length)} sub="charge-detail documents" k="blue"/>
        <Stat lab="Customers matched" ic={I.check} val={`${matched}/${pdfs.length}`} sub="resolved to a WMS code" k={matched<pdfs.length?"amber":"green"}/>
        <Stat lab="Lines extracted" ic={I.drill} val={fmt(lines)} sub="charge-detail rows" k="blue"/>
        <Stat lab="Warnings" ic={I.warn} val={fmt(warns)} sub="extraction / match issues" k={warns?"amber":""}/>
      </div>

      <div className="card" style={{marginBottom:18}}>
        <div className="hd"><Ic d={I.pdf} s={17}/><h4>Uploaded charge-detail sources</h4>
          <span className="sub">click a row to preview extracted lines</span>
          <div className="right"><button className="btn pri sm" disabled={!pipeline.wms} onClick={doCompare}><Ic d={I.compare} s={14}/>Compare vs WMS</button></div></div>
        <div className="bd">
          {!pipeline.wms && <div className="note warn" style={{marginBottom:13}}><Ic d={I.warn} s={15}/><span>Upload WMS data before comparing. The PDFs are ready and waiting.</span></div>}
          <div className="tw mid">
            <table><thead><tr><th style={{width:30}}></th><th>File</th><th>Client code</th><th>Matched</th><th className="num">Lines</th><th className="num">Stock on hand</th><th>Status</th><th></th></tr></thead>
            <tbody>{pdfs.map((p,i)=>{
              const sohCount=p.lines.filter(l=>String(l.order).trim()==="~").length;
              const isOpen=openPdf===i;
              return <React.Fragment key={i}>
              <tr style={{cursor:"pointer"}} onClick={()=>setOpenPdf(isOpen?null:i)}>
                <td><span style={{display:"inline-flex",transform:isOpen?"rotate(90deg)":"none",transition:".15s",color:"var(--muted)"}}><Ic d={I.chev} s={13}/></span></td>
                <td><span style={{display:"flex",alignItems:"center",gap:7}}><span style={{color:"var(--red)"}}><Ic d={I.file} s={15}/></span><span className="mono" style={{fontSize:12}}>{p.name}</span></span></td>
                <td>{p.customer? <b>{p.customer}</b> : <span style={{color:"var(--muted)"}}>not found</span>}</td>
                <td>{p.code? <span className="pill same">{p.code}</span> : <span className="pill" style={{background:"var(--amber-wash)",color:"var(--amber)",borderColor:"#f0d9b0"}}>unmatched</span>}</td>
                <td className="num">{p.lines.length}</td>
                <td className="num">{sohCount? <span className="tag t-soh">{sohCount}</span> : <span style={{color:"var(--line)"}}>—</span>}</td>
                <td>{p.warnings.length? <span className="tag t-under" title={p.warnings.join(" · ")}>{p.warnings.length} warning{p.warnings.length>1?"s":""}</span> : <span className="tag t-same">OK</span>}</td>
                <td><button className="btn gh sm" onClick={e=>{e.stopPropagation();removePdf(i);setOpenPdf(null);}}><Ic d={I.trash} s={14}/></button></td>
              </tr>
              {isOpen && <tr className="expandrow"><td colSpan={8}>
                <div className="subtw" style={{padding:"4px 4px 4px 30px",maxHeight:280,overflow:"auto"}}>
                  <table><thead><tr><th>Task</th><th>Order no</th><th>Product</th><th>Units</th><th className="num">Qty</th></tr></thead>
                  <tbody>{p.lines.map((l,j)=>
                    <tr key={j}>
                      <td><span className="pill">{l.task}</span></td>
                      <td className="mono">{l.order}{String(l.order).trim()==="~"&&<span className="tag t-soh" style={{marginLeft:6}}>SOH</span>}</td>
                      <td>{l.product}</td><td>{l.units}</td><td className="num">{fmt(l.qty)}</td>
                    </tr>)}</tbody></table>
                </div>
              </td></tr>}
              </React.Fragment>;
            })}</tbody></table>
          </div>
          {warns>0 && <div style={{marginTop:13}}>
            {pdfs.filter(p=>p.warnings.length).map((p,i)=>
              <div className="note warn" key={i} style={{marginBottom:6}}><Ic d={I.warn} s={15}/><span><b>{p.name}:</b> {p.warnings.join(" · ")}</span></div>)}
          </div>}
        </div>
      </div>
    </>}

    {pdfs.length===0 && <div className="card"><div className="bd"><Empty ic={I.pdf} h="No charge-detail PDFs uploaded" p="Upload a folder or select individual PDF files. Each document's customer name is matched to a WMS customer code automatically."/></div></div>}
  </>;
}

/* ───────────────────────── RULES VIEW (per customer) ───────────────────────── */
function RulesView({rules,setRules,saveRules,resetRules}){
  const customers=rules.customers||[];
  const [active,setActive]=useState(customers[0]?.code||null);
  const [adding,setAdding]=useState(false);
  const [q,setQ]=useState("");

  const activeCust=customers.find(c=>c.code===active)||customers[0];
  const list=customers.filter(c=> !q || c.code.toUpperCase().includes(q.toUpperCase()));

  const setCustomers=(next)=>setRules({...rules,customers:next});
  const updRule=(i,field,val)=>{
    setCustomers(customers.map(c=> c.code===active ? {...c, rules:c.rules.map((r,j)=>j===i?{...r,[field]:val}:r)} : c));
  };
  const addRule=()=>setCustomers(customers.map(c=> c.code===active ? {...c, rules:[...c.rules,{in:"PICK",out:"PICK",qty:"Same"}]} : c));
  const delRule=(i)=>setCustomers(customers.map(c=> c.code===active ? {...c, rules:c.rules.filter((_,j)=>j!==i)} : c));
  const delCustomer=(code)=>{
    const next=customers.filter(c=>c.code!==code);
    setCustomers(next);
    if(active===code) setActive(next[0]?.code||null);
  };
  const addCustomer=(code, copyFrom)=>{
    const up=code.trim().toUpperCase();
    if(!up) return;
    if(customers.some(c=>c.code.toUpperCase()===up)){ setActive(up); setAdding(false); return; }
    const src=copyFrom? customers.find(c=>c.code===copyFrom) : null;
    const rulesCopy = src ? src.rules.map(r=>({...r})) : [];
    setCustomers([...customers, {code:up, rules:rulesCopy}]);
    setActive(up); setAdding(false);
  };

  return <>
    <div className="section-intro" style={{display:"flex",alignItems:"center"}}>
      <div><h3>Audit rules</h3></div>
      <div style={{marginLeft:"auto",display:"flex",gap:8}}>
        <button className="btn sm" onClick={resetRules}><Ic d={I.reset} s={14}/>Reset to default</button>
        <button className="btn pri sm" onClick={saveRules}><Ic d={I.save} s={14}/>Save active rule set</button>
      </div>
    </div>

    <div className="grid" style={{gridTemplateColumns:"240px 1fr",gap:18}}>
      {/* customer list */}
      <div className="card" style={{alignSelf:"start"}}>
        <div className="hd" style={{padding:"13px 14px"}}><h4 style={{fontSize:12.5}}>Customers</h4>
          <div className="right"><span style={{fontSize:11,color:"var(--muted)"}}>{customers.length}</span></div></div>
        <div style={{padding:"10px 10px 8px"}}>
          <input className="f" placeholder="Search…" value={q} onChange={e=>setQ(e.target.value)} style={{fontSize:12.5,padding:"6px 9px"}}/>
        </div>
        <div style={{padding:"0 8px 8px",display:"flex",flexDirection:"column",gap:2,maxHeight:440,overflow:"auto"}}>
          {list.map(c=>
            <div key={c.code} className="linkbtn"
              style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderRadius:8,cursor:"pointer",
              background:active===c.code?"var(--blue-wash)":"transparent"}}
              onClick={()=>setActive(c.code)}>
              <span style={{fontWeight:active===c.code?700:560,color:active===c.code?"var(--blue-deep)":"var(--ink-soft)",flex:1}}>{c.code}</span>
              <span style={{fontSize:11,color:"var(--muted)"}}>{c.rules.length}</span>
            </div>)}
          {list.length===0 && <div style={{padding:"14px 10px",color:"var(--muted)",fontSize:12.5,textAlign:"center"}}>No match</div>}
        </div>
        <div style={{padding:"8px 10px 12px",borderTop:"1px solid var(--line-soft)"}}>
          <button className="btn pri sm" style={{width:"100%",justifyContent:"center"}} onClick={()=>setAdding(true)}><Ic d={I.plus} s={14}/>Add customer</button>
        </div>
      </div>

      {/* rules for active customer */}
      <div className="card">
        {!activeCust ? <div className="bd"><Empty ic={I.rules} h="No customers" p="Add a customer to start defining task transformation rules." cta="Add customer" onCta={()=>setAdding(true)}/></div>
        : <>
          <div className="hd"><Ic d={I.transform} s={17}/><h4>{activeCust.code} · task transformation</h4>
            <span className="sub">{activeCust.rules.length} rule{activeCust.rules.length!==1?"s":""}</span>
            <div className="right">
              <button className="btn sm" onClick={addRule}><Ic d={I.plus} s={14}/>Add rule</button>
              <button className="btn sm danger" onClick={()=>delCustomer(activeCust.code)}><Ic d={I.trash} s={14}/>Delete customer</button>
            </div></div>
          <div className="bd rule-edit">
            {activeCust.rules.length===0
              ? <Empty ic={I.transform} h="No rules yet" p="Add a transformation rule, or this customer's tasks will be reported as having no rule." cta="Add rule" onCta={addRule}/>
              : <div className="tw">
                <table><thead><tr><th>Source task</th><th></th><th>Output task</th><th>Quantity mode</th><th style={{width:50}}></th></tr></thead>
                <tbody>{activeCust.rules.map((r,i)=>
                  <tr key={i}>
                    <td><input value={r.in} onChange={e=>updRule(i,"in",e.target.value.toUpperCase())}/></td>
                    <td style={{color:"var(--muted)",textAlign:"center"}}><Ic d={I.chev} s={13}/></td>
                    <td><input value={r.out} onChange={e=>updRule(i,"out",e.target.value.toUpperCase())}/></td>
                    <td><select className="f" style={{padding:"5px 8px"}} value={r.qty} onChange={e=>updRule(i,"qty",e.target.value)}><option>Same</option><option>Force1</option></select></td>
                    <td><button className="btn gh sm" onClick={()=>delRule(i)}><Ic d={I.trash} s={14}/></button></td>
                  </tr>)}</tbody></table>
              </div>}
          </div>
        </>}
      </div>
    </div>

    {adding && <AddCustomerModal customers={customers} onCancel={()=>setAdding(false)} onAdd={addCustomer}/>}

    <div className="note info" style={{marginTop:18}}><Ic d={I.info} s={15}/><span>Saving rules clears the current transform and comparison so they always reflect the latest logic. The saved rule set is snapshotted into every reconciliation run.</span></div>
  </>;
}

function AddCustomerModal({customers,onCancel,onAdd}){
  const [code,setCode]=useState("");
  const [copyFrom,setCopyFrom]=useState("");   // "" = start blank
  const sorted=[...customers].sort((a,b)=>a.code.localeCompare(b.code));
  return <div className="modal-bg" onClick={onCancel}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"><Ic d={I.plus} s={17}/><h4>Add customer</h4></div>
      <div className="mb">
        <label className="fl">Customer code</label>
        <input className="f" autoFocus value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="e.g. ACA"/>

        <label className="fl" style={{marginTop:16}}>Does this customer use the same rules as an existing customer?</label>
        <select className="f" value={copyFrom} onChange={e=>setCopyFrom(e.target.value)}>
          <option value="">No — start with no rules</option>
          {sorted.map(c=><option key={c.code} value={c.code}>Copy rules from {c.code} ({c.rules.length} rule{c.rules.length!==1?"s":""})</option>)}
        </select>
        <p className="help">You can edit or add more rules after creating the customer.</p>
      </div>
      <div className="mf">
        <button className="btn" onClick={onCancel}>Cancel</button>
        <button className="btn pri" disabled={!code.trim()} onClick={()=>onAdd(code,copyFrom||null)}><Ic d={I.plus} s={14}/>Add customer</button>
      </div>
    </div>
  </div>;
}

/* ───────────────────────── TRANSFORM VIEW ───────────────────────── */
function TransformView({rawWMS,transformed,doTransform,rules,setView,doCompare,pipeline}){
  if(rawWMS.length===0) return <div className="card"><div className="bd"><Empty ic={I.transform} h="Nothing to transform yet" p="Upload WMS data first, then return here to apply the audit rules." cta="Upload WMS data" onCta={()=>setView("wms")}/></div></div>;
  return <>
    <div className="kpiwrap" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
      <Stat lab="Raw WMS rows" ic={I.wms} val={fmt(rawWMS.length)} sub="as uploaded" k="blue"/>
      <Stat lab="Audit-ready rows" ic={I.transform} val={transformed?fmt(transformed.rows.length):"—"} sub="after task expansion" k="green"/>
      <Stat lab="Unmapped rows" ic={I.warn} val={transformed?fmt(transformed.issues.length):"—"} sub="skipped — no rule" k={transformed&&transformed.issues.length?"amber":""}/>
    </div>

    <div className="card" style={{marginBottom:18}}>
      <div className="hd"><Ic d={I.transform} s={17}/><h4>Apply audit rules to WMS</h4>
        <span className="sub">Customer mapping · task expansion · quantity mode</span>
        <div className="right">
          <button className="btn sm" onClick={doTransform}><Ic d={I.reset} s={14}/>{transformed?"Re-run transform":"Run transform"}</button>
          {transformed && <button className="btn pri sm" disabled={!pipeline.pdf} onClick={doCompare}><Ic d={I.compare} s={14}/>Compare vs charge detail</button>}
        </div></div>
      <div className="bd">
        {!transformed && <Empty ic={I.transform} h="Ready to transform" p="Run the transform to expand each WMS task into its audit-ready output tasks." cta="Run transform now" onCta={doTransform}/>}
        {transformed && <>
          {transformed.issues.length>0 && <div className="note warn" style={{marginBottom:13}}><Ic d={I.warn} s={15}/><span><b>{transformed.issues.length} rows skipped</b> — {transformed.issues.slice(0,3).join("; ")}{transformed.issues.length>3?" …":""}</span></div>}
          <div className="tw tall">
            <table><thead><tr><th>Customer</th><th>Source</th><th></th><th>Output task</th><th>Qty mode</th><th>Order no</th><th>Product</th><th>Units</th><th className="num">Qty</th></tr></thead>
            <tbody>{transformed.rows.map((r,i)=>
              <tr key={i}>
                <td><b>{r.customer}</b></td>
                <td>{r.srcTask}</td><td style={{color:"var(--muted)"}}><Ic d={I.chev} s={12}/></td>
                <td><span className="pill same">{r.task}</span></td>
                <td><span className={"pill "+(r.qtyMode==="Force1"?"force":r.qtyMode==="Manual"?"":"same")}>{r.qtyMode}</span></td>
                <td className="mono">{r.order}</td><td>{r.product}</td><td>{r.units}</td><td className="num">{fmt(r.qty)}</td>
              </tr>)}</tbody></table>
          </div>
        </>}
      </div>
    </div>
  </>;
}

/* ───────────────────────── SUMMARY VIEW ───────────────────────── */
function SummaryView({result,doCompare,pipeline,setView}){
  const [filter,setFilter]=useState("ALL");
  if(!result) return <NeedCompare {...{pipeline,doCompare,setView}}/>;
  const rows=result.summary.filter(s=> filter==="ALL"||s.type===filter);
  const counts={ALL:result.summary.length,MISSING:0,UNDER:0,OVER:0};
  result.summary.forEach(s=>{counts[s.type]++;});
  const totUnder=result.summary.filter(s=>s.type!=="OVER").reduce((a,s)=>a+Math.max(0,s.diff),0);
  const totOver=result.summary.filter(s=>s.type==="OVER").reduce((a,s)=>a+Math.abs(s.diff),0);
  const sohTotal=(result.soh||[]).reduce((a,s)=>a+s.qty,0);
  return <>
    <div className="kpiwrap">
      <Stat lab="Variance groups" ic={I.variance} val={fmt(result.summary.length)} sub="customer / task combinations" k="amber"/>
      <Stat lab="Under / missing units" ic={I.warn} val={fmt(totUnder)} sub="not yet charged" k="red"/>
      <Stat lab="Over-charged units" ic={I.drill} val={fmt(totOver)} sub="charged in excess" k="blue"/>
      <Stat lab="Stock on hand" ic={I.info} val={fmt(sohTotal)} sub="excluded from variance" k=""/>
    </div>

    <div className="card">
      <div className="hd"><Ic d={I.variance} s={17}/><h4>Variance summary</h4><span className="sub">matched & stock-on-hand rows hidden</span>
        <div className="right">
          <div className="filterbar">
            {[["ALL","All"],["MISSING","Missing"],["UNDER","Undercharge"],["OVER","Overcharge"]].map(([k,l])=>
              <button key={k} className={"fchip"+(filter===k?" on":"")} onClick={()=>setFilter(k)}>{l}<span style={{opacity:.6,marginLeft:5}}>{counts[k]}</span></button>)}
          </div>
          <button className="btn gh sm" onClick={()=>setView("breakdown")}>Breakdown<Ic d={I.chev} s={13}/></button>
        </div></div>
      <div className="bd">
        {rows.length===0 ? <MiniEmpty msg="No variances in this filter."/> :
        <div className="tw tall">
          <table><thead><tr><th>Customer</th><th>Task</th><th className="num">In charge detail</th><th className="num">Should be (WMS)</th><th className="num">Difference</th><th>Variance</th></tr></thead>
          <tbody>{rows.map((s,i)=>
            <tr key={i}>
              <td><b>{s.customer}</b></td>
              <td><span className="pill">{s.task}</span></td>
              <td className="num">{fmt(s.chargeQty)}</td>
              <td className="num">{fmt(s.wmsQty)}</td>
              <td className="num" style={{fontWeight:700,color:s.diff>0?"var(--red)":"var(--blue)"}}>{s.diff>0?"+":""}{s.diff}</td>
              <td><TypeTag t={s.type}/>{" "}
                <span style={{fontSize:11.5,color:"var(--muted)"}}>{s.diff>0?`${Math.abs(s.diff)} missing`:`${Math.abs(s.diff)} overcharged`}</span></td>
            </tr>)}</tbody></table>
        </div>}
        {sohTotal>0 && <div className="note soh" style={{marginTop:14}}><Ic d={I.info} s={15}/><span>Stock-on-hand lines are excluded from variance. See the <button className="linkbtn" onClick={()=>setView("soh")}>Stock on Hand</button> tab for the breakdown by customer.</span></div>}
      </div>
    </div>
  </>;
}

/* ───────────────────────── BREAKDOWN VIEW ───────────────────────── */
function BreakdownView({result,doCompare,pipeline,setView}){
  const [open,setOpen]=useState({});
  const [filter,setFilter]=useState("ALL");
  if(!result) return <NeedCompare {...{pipeline,doCompare,setView}}/>;
  // group breakdown rows under their summary
  const groups=result.summary.map(s=>({...s, rows:result.detail.filter(d=>d.customer===s.customer&&d.task===s.task)}))
    .filter(s=> filter==="ALL"||s.type===filter);
  return <>
    <div className="section-intro" style={{display:"flex",alignItems:"center"}}>
      <div><h3>Detailed variance breakdown</h3><p>Expand a summary line to see the exact rows that explain the difference.</p></div>
      <div style={{marginLeft:"auto"}} className="filterbar">
        {[["ALL","All"],["MISSING","Missing"],["UNDER","Undercharge"],["OVER","Overcharge"]].map(([k,l])=>
          <button key={k} className={"fchip"+(filter===k?" on":"")} onClick={()=>setFilter(k)}>{l}</button>)}
      </div>
    </div>
    <div className="card">
      <div className="bd" style={{padding:0}}>
        <div className="tw" style={{border:0,borderRadius:0}}>
          <table>
            <thead><tr><th style={{width:34}}></th><th>Customer</th><th>Task</th><th className="num">Charged</th><th className="num">Should be</th><th className="num">Diff</th><th>Variance</th><th className="num">Rows</th></tr></thead>
            <tbody>{groups.map((g,i)=>{
              const key=g.customer+g.task; const isOpen=open[key];
              return <React.Fragment key={key}>
                <tr style={{cursor:"pointer"}} onClick={()=>setOpen(o=>({...o,[key]:!o[key]}))}>
                  <td><span style={{display:"inline-flex",transform:isOpen?"rotate(90deg)":"none",transition:".15s",color:"var(--muted)"}}><Ic d={I.chev} s={14}/></span></td>
                  <td><b>{g.customer}</b></td><td><span className="pill">{g.task}</span></td>
                  <td className="num">{fmt(g.chargeQty)}</td><td className="num">{fmt(g.wmsQty)}</td>
                  <td className="num" style={{fontWeight:700,color:g.diff>0?"var(--red)":"var(--blue)"}}>{g.diff>0?"+":""}{g.diff}</td>
                  <td><TypeTag t={g.type}/></td><td className="num">{g.rows.length}</td>
                </tr>
                {isOpen && <tr className="expandrow"><td colSpan={8}>
                  <div className="subtw" style={{padding:"4px 4px 4px 34px"}}>
                    <table><thead><tr><th>Order no</th><th>Product</th><th>Units</th><th className="num">Charged</th><th className="num">Should be (WMS)</th><th className="num">Diff</th><th>Detail</th></tr></thead>
                    <tbody>{g.rows.map((d,j)=>
                      <tr key={j}>
                        <td className="mono">{d.order}{String(d.order).trim()==="~"&&<span className="tag t-soh" style={{marginLeft:6}}>stock on hand</span>}</td>
                        <td>{d.product}</td><td>{d.units}</td>
                        <td className="num">{fmt(d.chargeQty)}</td><td className="num">{fmt(d.wmsQty)}</td>
                        <td className="num" style={{fontWeight:600,color:d.diff>0?"var(--red)":"var(--blue)"}}>{d.diff>0?"+":""}{d.diff}</td>
                        <td><TypeTag t={d.type}/>{" "}<span style={{fontSize:11.5,color:"var(--muted)"}}>
                          {d.type==="MISSING"?"whole row absent from charge detail":d.type==="UNDER"?`short by ${Math.abs(d.diff)}`:`charged ${Math.abs(d.diff)} too many`}</span></td>
                      </tr>)}</tbody></table>
                  </div>
                </td></tr>}
              </React.Fragment>;
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  </>;
}

/* ───────────────────────── STOCK ON HAND VIEW ───────────────────────── */
function SOHView({result,doCompare,pipeline,setView}){
  const [cust,setCust]=useState("ALL");
  const [open,setOpen]=useState({});
  if(!result) return <NeedCompare {...{pipeline,doCompare,setView}}/>;
  const soh=result.soh||[];   // line detail: {customer,task,product,units,qty}
  if(soh.length===0) return <div className="card"><div className="bd"><Empty ic={I.box} h="No stock on hand" p="No charge-detail lines had Order No = &quot;~&quot; in this run."/></div></div>;

  const customers=[...new Set(soh.map(s=>s.customer))].sort();
  const byCust={};
  soh.forEach(s=>{ byCust[s.customer]=(byCust[s.customer]||0)+s.qty; });

  // group into summary: customer + task + unit  →  total qty + product rows
  const grpMap={};
  soh.forEach(s=>{
    const k=[s.customer,s.task,s.units].join("¦");
    grpMap[k]=grpMap[k]||{customer:s.customer,task:s.task,units:s.units,qty:0,products:[]};
    grpMap[k].qty+=s.qty;
    grpMap[k].products.push({product:s.product,qty:s.qty});
  });
  let groups=Object.values(grpMap).sort((a,b)=> a.customer.localeCompare(b.customer) || a.task.localeCompare(b.task) || b.qty-a.qty);
  if(cust!=="ALL") groups=groups.filter(g=>g.customer===cust);
  // collapse duplicate products inside a group
  groups.forEach(g=>{
    const pm={}; g.products.forEach(p=>{ pm[p.product]=(pm[p.product]||0)+p.qty; });
    g.products=Object.entries(pm).map(([product,qty])=>({product,qty})).sort((a,b)=>b.qty-a.qty);
  });
  const total=groups.reduce((a,g)=>a+g.qty,0);

  return <>
    <div className="kpiwrap" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
      <Stat lab="SOH groups" ic={I.box} val={fmt(groups.length)} sub="customer / task / unit" k="blue"/>
      <Stat lab="SOH units" ic={I.drill} val={fmt(soh.reduce((a,s)=>a+s.qty,0))} sub="excluded from variance" k="blue"/>
      <Stat lab="Customers with SOH" ic={I.archive} val={fmt(customers.length)} sub="have stock on hand" k=""/>
    </div>

    <div className="card">
      <div className="hd"><Ic d={I.box} s={17}/><h4>Stock on hand by customer</h4>
        <span className="sub">Order No = "~" · click a row to see products</span>
        <div className="right">
          <select className="f" style={{width:"auto",padding:"6px 10px"}} value={cust} onChange={e=>{setCust(e.target.value);setOpen({});}}>
            <option value="ALL">All customers ({customers.length})</option>
            {customers.map(c=><option key={c} value={c}>{c} — {fmt(byCust[c])} units</option>)}
          </select>
        </div></div>
      <div className="bd" style={{padding:0}}>
        <div className="tw tall" style={{border:0,borderRadius:0}}>
          <table>
            <thead><tr><th style={{width:34}}></th><th>Customer</th><th>Task</th><th>Units</th><th className="num">Total qty</th><th className="num">Products</th></tr></thead>
            <tbody>{groups.map((g,i)=>{
              const key=g.customer+g.task+g.units; const isOpen=open[key];
              return <React.Fragment key={key}>
                <tr style={{cursor:"pointer"}} onClick={()=>setOpen(o=>({...o,[key]:!o[key]}))}>
                  <td><span style={{display:"inline-flex",transform:isOpen?"rotate(90deg)":"none",transition:".15s",color:"var(--muted)"}}><Ic d={I.chev} s={14}/></span></td>
                  <td><b>{g.customer}</b></td>
                  <td><span className="pill">{g.task}</span></td>
                  <td>{g.units}</td>
                  <td className="num" style={{fontWeight:700}}>{fmt(g.qty)}</td>
                  <td className="num">{g.products.length}</td>
                </tr>
                {isOpen && <tr className="expandrow"><td colSpan={6}>
                  <div className="subtw" style={{padding:"4px 4px 4px 34px",maxHeight:300,overflow:"auto"}}>
                    <table><thead><tr><th>Product</th><th className="num">Qty</th></tr></thead>
                    <tbody>{g.products.map((p,j)=>
                      <tr key={j}><td>{p.product}</td><td className="num">{fmt(p.qty)}</td></tr>)}</tbody></table>
                  </div>
                </td></tr>}
              </React.Fragment>;
            })}</tbody>
            <tfoot><tr style={{background:"#f6f9fd",fontWeight:700}}>
              <td colSpan={4} style={{padding:"9px 12px",borderTop:"2px solid var(--line)"}}>{cust==="ALL"?"All customers":cust} — total</td>
              <td className="num" style={{padding:"9px 12px",borderTop:"2px solid var(--line)"}}>{fmt(total)}</td>
              <td style={{borderTop:"2px solid var(--line)"}}></td>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  </>;
}

/* ───────────────────────── SAVE VIEW ───────────────────────── */
function SaveView({result,saveRun,setView}){
  const [name,setName]=useState(()=>{ const d=new Date(); const ws=new Date(d.setDate(d.getDate()+(7-d.getDay())%7)); return "Week Ending "+ws.toLocaleDateString("en-GB").replace(/\//g,"-"); });
  const [done,setDone]=useState(false);
  if(!result) return <div className="card"><div className="bd"><Empty ic={I.save} h="Nothing to save yet" p="Run a comparison first, then archive the result by week ending." cta="Go to comparison" onCta={()=>setView("summary")}/></div></div>;
  return <div className="grid g2">
    <div className="card">
      <div className="hd"><Ic d={I.save} s={17}/><h4>Archive this reconciliation</h4></div>
      <div className="bd">
        <label className="fl">Run name</label>
        <input className="f" value={name} onChange={e=>setName(e.target.value)} placeholder="Week Ending 24-05-2026"/>
        <p className="help">Runs are usually named by week ending so they sort neatly in the archive.</p>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button className="btn pri" disabled={!name.trim()} onClick={async()=>{await saveRun(name.trim());setDone(true);}}><Ic d={I.save} s={15}/>Save run to archive</button>
          <button className="btn" onClick={()=>setView("runs")}><Ic d={I.archive} s={15}/>View archive</button>
        </div>
        {done && <div className="note info" style={{marginTop:14}}><Ic d={I.check} s={15}/><span>Saved. The run, its variances and the audit-rule snapshot are stored and can be re-opened from Saved Runs.</span></div>}
      </div>
    </div>
    <div className="card">
      <div className="hd"><Ic d={I.info} s={17}/><h4>What gets saved</h4></div>
      <div className="bd">
        <ul style={{margin:0,paddingLeft:18,color:"var(--ink-soft)",fontSize:13,lineHeight:1.9}}>
          <li>{result.summary.length} variance summary groups</li>
          <li>{result.detail.length} breakdown rows</li>
          <li>The exact audit-rule set used for this run</li>
          <li>PDF sources and matched customer codes</li>
        </ul>
        <div className="note soh" style={{marginTop:14}}><Ic d={I.info} s={15}/><span>Saved runs can be downloaded as Excel at any time from the archive.</span></div>
      </div>
    </div>
  </div>;
}

/* ───────────────────────── RUNS VIEW ───────────────────────── */
function RunsView({runs,deleteRun,exportExcel,setView}){
  const [openRun,setOpenRun]=useState(null);
  if(runs.length===0) return <div className="card"><div className="bd"><Empty ic={I.archive} h="No saved runs" p="Reconciliation runs you save will appear here, grouped by week ending." cta="Start a reconciliation" onCta={()=>setView("wms")}/></div></div>;
  if(openRun){
    const r=openRun;
    return <>
      <div className="section-intro" style={{display:"flex",alignItems:"center"}}>
        <button className="btn sm" onClick={()=>setOpenRun(null)} style={{transform:"scaleX(-1)"}}><Ic d={I.chev} s={14}/></button>
        <div style={{marginLeft:12}}><h3>{r.name}</h3><p>Saved {new Date(r.savedAt).toLocaleString()} · {r.counts.variances} variance groups</p></div>
        <button className="btn pri sm" style={{marginLeft:"auto"}} onClick={()=>exportExcel(r)}><Ic d={I.excel} s={14}/>Download Excel</button>
      </div>
      <div className="kpiwrap">
        <Stat lab="WMS rows" ic={I.wms} val={fmt(r.counts.wmsRaw)} sub={`${fmt(r.counts.wmsT)} transformed`} k="blue"/>
        <Stat lab="Charge PDFs" ic={I.pdf} val={fmt(r.counts.pdfs)} sub={`${fmt(r.counts.lines)} lines`} k="blue"/>
        <Stat lab="Variance groups" ic={I.variance} val={fmt(r.counts.variances)} sub="customer / task" k="amber"/>
        <Stat lab="Breakdown rows" ic={I.drill} val={fmt(r.detail.length)} sub="line-level" k=""/>
      </div>
      <div className="card">
        <div className="hd"><Ic d={I.variance} s={17}/><h4>Variance summary (archived)</h4></div>
        <div className="bd"><div className="tw mid">
          <table><thead><tr><th>Customer</th><th>Task</th><th className="num">Charged</th><th className="num">Should be</th><th className="num">Diff</th><th>Variance</th></tr></thead>
          <tbody>{r.summary.map((s,i)=><tr key={i}><td><b>{s.customer}</b></td><td><span className="pill">{s.task}</span></td><td className="num">{fmt(s.chargeQty)}</td><td className="num">{fmt(s.wmsQty)}</td><td className="num" style={{fontWeight:700,color:s.diff>0?"var(--red)":"var(--blue)"}}>{s.diff>0?"+":""}{s.diff}</td><td><TypeTag t={s.type}/></td></tr>)}</tbody></table>
        </div></div>
      </div>
    </>;
  }
  return <>
    <div className="section-intro"><h3>Reconciliation archive</h3><p>{runs.length} saved run{runs.length!==1?"s":""}. Open one to review its variances or download the Excel report.</p></div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {runs.map(r=>
        <div className="runrow" key={r.id}>
          <div className="fic"><Ic d={I.folder} s={18}/></div>
          <div className="meta" style={{cursor:"pointer"}} onClick={()=>setOpenRun(r)}>
            <div className="nm">{r.name}</div>
            <div className="dt">{r.counts.variances} variance groups · {r.counts.pdfs} PDFs · saved {new Date(r.savedAt).toLocaleDateString()}</div>
          </div>
          <button className="btn sm" onClick={()=>setOpenRun(r)}>Open</button>
          <button className="btn sm" onClick={()=>exportExcel(r)}><Ic d={I.excel} s={14}/>Excel</button>
          <button className="btn sm danger" onClick={()=>deleteRun(r.id)}><Ic d={I.trash} s={14}/></button>
        </div>)}
    </div>
  </>;
}

/* ───────────────────────── SHARED ───────────────────────── */
function Empty({ic,h,p,cta,onCta}){
  return <div className="empty"><div className="ring"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">{ic}</svg></div>
    <h4>{h}</h4><p>{p}</p>{cta && <div style={{marginTop:14}}><button className="btn pri" onClick={onCta}>{cta}</button></div>}</div>;
}
function NeedCompare({pipeline,doCompare,setView}){
  const ready=pipeline.wms&&pipeline.pdf;
  return <div className="card"><div className="bd">
    <Empty ic={I.compare} h="No comparison results yet"
      p={ready?"Inputs are ready. Run the comparison to surface variances.":"Upload both WMS data and charge-detail PDFs, then run the comparison."}
      cta={ready?"Run comparison now":"Go to inputs"} onCta={ready?doCompare:()=>setView(pipeline.wms?"pdf":"wms")}/>
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
